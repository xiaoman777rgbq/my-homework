<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的GitHub Pages作业</title>
    <style>
        /* 全局样式：高级感黑白灰+简约风 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft Yahei", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        /* 卡片容器：毛玻璃效果，高级感核心 */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 50px 40px;
            max-width: 700px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            color: #2d3748;
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .subtitle {
            color: #718096;
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        /* 按钮组：交互感拉满 */
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        .btn {
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-primary {
            background: #4299e1;
            color: white;
            box-shadow: 0 4px 15px rgba(66, 153, 225, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(66, 153, 225, 0.4);
        }
        .btn-secondary {
            background: transparent;
            color: #4299e1;
            border: 2px solid #4299e1;
        }
        .btn-secondary:hover {
            background: #4299e1;
            color: white;
        }
        /* 信息区：简约排版 */
        .info {
            border-top: 1px solid #e2e8f0;
            padding-top: 30px;
            color: #a0aec0;
            font-size: 0.9rem;
        }
        .info a {
            color: #4299e1;
            text-decoration: none;
            transition: color 0.3s;
        }
        .info a:hover {
            color: #3182ce;
        }
        /* 响应式适配手机 */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>✨ GitHub Pages 作业展示</h1>
        <p class="subtitle">基于Git与VS Code搭建的个人静态网页，实现本地开发与云端部署全流程</p>
        
        <div class="btn-group">
            <a href="https://github.com/xiaoman777rgbq/my-homework" target="_blank" class="btn btn-primary">查看仓库</a>
            <a href="https://xiaoman777rgbq.github.io/my-homework/" target="_blank" class="btn btn-secondary">访问网页</a>
        </div>

        <div class="info">
            <p>学号：P241012498 | 班级：新闻学3班</p>
            <p>技术栈：HTML + CSS + Git + VS Code + GitHub Pages</p>
        </div>
    </div>
</body>
</html>
